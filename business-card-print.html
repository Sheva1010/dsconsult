<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>DS CONSULT — Print</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @page {
    size: 91mm 60mm;
    margin: 0;
  }

  body {
    font-family: Verdana, sans-serif;
    width: 91mm;
  }

  .page {
    width: 91mm;
    height: 60mm;
    position: relative;
    overflow: hidden;
    page-break-after: always;
  }

  /* 3mm bleed guides (только для экрана) */
  @media screen {
    body {
      background: #888;
      padding: 10mm;
      gap: 10mm;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: auto;
    }
    .page {
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .bleed-guide {
      position: absolute;
      inset: 3mm;
      border: 0.3px dashed rgba(255,255,255,0.15);
      pointer-events: none;
      z-index: 100;
    }
    .label {
      color: #fff;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 4mm;
      font-family: Verdana, sans-serif;
    }
  }
  @media print {
    .bleed-guide { display: none; }
    .label { display: none; }
  }

  /* ── ПЕРЕДНЯЯ ── */
  .front {
    background: #0d0d0d;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .front-accent {
    position: absolute;
    top: -8mm; right: -8mm;
    width: 30mm; height: 30mm;
    background: radial-gradient(circle, rgba(91,155,255,0.15) 0%, transparent 70%);
    border-radius: 50%;
  }
  .front-accent-2 {
    position: absolute;
    bottom: -6mm; left: -6mm;
    width: 22mm; height: 22mm;
    background: radial-gradient(circle, rgba(91,155,255,0.08) 0%, transparent 70%);
    border-radius: 50%;
  }
  .front-logo {
    font-size: 9mm;
    font-weight: 900;
    color: #ffffff;
    letter-spacing: -0.4mm;
    line-height: 1;
    z-index: 1;
  }
  .front-logo span { color: #5B9BFF; }
  .front-tagline {
    font-size: 1.8mm;
    letter-spacing: 0.7mm;
    color: #555555;
    text-transform: uppercase;
    margin-top: 2.5mm;
    z-index: 1;
  }
  .front-line {
    width: 8mm; height: 0.4mm;
    background: #5B9BFF;
    margin-top: 5mm;
    opacity: 0.6;
    z-index: 1;
  }

  /* ── ЗАДНЯЯ ── */
  .back {
    background: #0d0d0d;
    display: flex;
    align-items: center;
  }
  .qr-col {
    width: 26mm;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2mm;
    flex-shrink: 0;
    border-right: 0.2mm solid #1e1e1e;
    height: 100%;
  }
  .qr-col canvas,
  .qr-col img { width: 18mm !important; height: 18mm !important; }
  .qr-label {
    font-size: 1.4mm;
    letter-spacing: 0.5mm;
    color: #444444;
    text-transform: uppercase;
  }
  .info-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 7mm;
  }
  .back-name {
    font-size: 4.8mm;
    font-weight: 900;
    color: #ffffff;
    letter-spacing: -0.2mm;
    line-height: 1.15;
  }
  .back-role {
    font-size: 1.8mm;
    color: #5B9BFF;
    margin-top: 1.2mm;
    letter-spacing: 0.4mm;
    text-transform: uppercase;
  }
  .back-divider {
    width: 5mm; height: 0.2mm;
    background: #222222;
    margin: 3.5mm 0;
  }
  .contacts { display: flex; flex-direction: column; gap: 1.6mm; }
  .contact-row { display: flex; align-items: center; gap: 1.8mm; }
  .contact-icon { color: #5B9BFF; font-size: 2.2mm; width: 3mm; text-align: center; }
  .contact-val { font-size: 2mm; color: #777777; }
  .glow {
    position: absolute;
    bottom: -15mm; right: -15mm;
    width: 40mm; height: 40mm;
    background: radial-gradient(circle, rgba(91,155,255,0.06) 0%, transparent 70%);
    border-radius: 50%;
  }
</style>
</head>
<body>

  <div class="label">Передняя сторона · 85×54мм + 3мм вылет</div>
  <div class="page front">
    <div class="bleed-guide"></div>
    <div class="front-accent"></div>
    <div class="front-accent-2"></div>
    <div class="front-logo">DS<span> CONSULT</span></div>
    <div class="front-tagline">Strategic Partner for Founders</div>
    <div class="front-line"></div>
  </div>

  <div class="label">Оборотная сторона · 85×54мм + 3мм вылет</div>
  <div class="page back">
    <div class="bleed-guide"></div>
    <div class="glow"></div>
    <div class="qr-col">
      <div id="qr"></div>
      <div class="qr-label">LinkedIn</div>
    </div>
    <div class="info-col">
      <div class="back-name">Dima<br>Shevchenko</div>
      <div class="back-role">CEO &amp; Founder</div>
      <div class="back-divider"></div>
      <div class="contacts">
        <div class="contact-row"><span class="contact-icon">✆</span><span class="contact-val">+48 537 777 946</span></div>
        <div class="contact-row"><span class="contact-icon">✉</span><span class="contact-val">ceo@dsconsult.com.pl</span></div>
        <div class="contact-row"><span class="contact-icon">⊕</span><span class="contact-val">dsconsult.com.pl</span></div>
      </div>
    </div>
  </div>

<script>
  new QRCode(document.getElementById("qr"), {
    text: "https://linkedin.com/in/dmitriy-shevchenko",
    width: 200, height: 200,
    colorDark: "#ffffff",
    colorLight: "#0d0d0d",
    correctLevel: QRCode.CorrectLevel.H
  });
</script>
</body>
</html>
