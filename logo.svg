    <stop offset="0%" stop-color="#5B9BFF" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#5B9BFF" stop-opacity="0"/>
  </radialGradient>
  <rect width="520" height="150" rx="12" fill="url(#glow1)"/>

  <!-- Glow accent bottom-left -->
